<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>健啓Webオンリー イメージソング</title>

<style>

body{
font-family:sans-serif;
max-width:900px;
margin:auto;
padding:40px;
background:#fafafa;
line-height:1.8;
scroll-behavior:smooth;
}

h1{
text-align:center;
margin-bottom:40px;
}

.song-list a{
display:block;
padding:10px;
border-bottom:1px solid #ddd;

}

.song{

padding-top:20px;

}

.comment{
background:#f5f5f5;
padding:15px;

}

iframe{
margin-top:10px;
}

</style>
</head>

<body>

<h1>健啓Webオンリー<br>イメージソング企画</h1>

<h2>🎧 曲一覧</h2>

<div class="song-list">

</div>


<div class="song" id="song1">
<h3>01 曲名</h3>

<iframe width="560" height="315"
src="https://www.youtube.com/embed/動画ID"
frameborder="0"
allowfullscreen>
</iframe>

<div class="comment">
コメント：

</div>

</div>

</html>
