<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>健啓Webオンリー イメージソング企画</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
margin:0;
background:#f8f8fb;
color:#333;
line-height:1.7;
scroll-behavior:smooth;
}

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
}

h1{
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
margin-bottom:40px;
color:#666;
}

.song-list{
background:white;
border-radius:10px;
padding:20px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
margin-bottom:50px;
}

.song-list a{
display:block;
padding:8px 0;
text-decoration:none;
color:#444;
border-bottom:1px solid #eee;
}

.song-list a:hover{
color:#6a7cff;
}

.song-card{
background:white;
padding:25px;
border-radius:10px;
margin-bottom:30px;
box-shadow:0 3px 12px rgba(0,0,0,0.05);
}

.song-title{
font-size:20px;
font-weight:bold;
margin-bottom:10px;
}

.comment{
background:#f3f4ff;
padding:15px;
border-radius:6px;
margin-top:15px;
}

iframe{
margin-top:15px;
width:100%;
height:315px;
border:none;
}

.back{
text-align:right;
margin-top:10px;
}

.back a{
font-size:14px;
color:#888;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<h1>健啓Webオンリー</h1>
<p class="subtitle">イメージソング企画 発表</p>

<div class="song-list">

<b>🎧 曲一覧</b>

<a href="#s1">01 曲名</a>
<a href="#s2">02 曲名</a>
<a href="#s3">03 曲名</a>
<a href="#s4">04 曲名</a>
<a href="#s5">05 曲名</a>

</div>


<div class="song-card" id="s1">

<div class="song-title">01 曲名</div>

<iframe src="https://www.youtube.com/embed/動画ID"></iframe>

<div class="comment">
💬 コメント  
ここに募集コメントを書きます。
</div>

<div class="back">
<a href="#top">↑一覧へ戻る</a>
</div>

</div>


<div class="song-card" id="s2">

<div class="song-title">02 曲名</div>

<iframe src="https://www.youtube.com/embed/動画ID"></iframe>

<div class="comment">
💬 コメント  
ここにコメント
</div>

</div>


<div class="song-card" id="s3">

<div class="song-title">03 曲名</div>

<iframe src="https://www.youtube.com/embed/動画ID"></iframe>

<div class="comment">
💬 コメント  
ここにコメント
</div>

</div>


</div>

</body>
</html>
