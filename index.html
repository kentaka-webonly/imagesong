<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>健啓Webオンリー イメージソング企画</title>

<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:#0f0f14;
color:#eee;
line-height:1.7;
}

/* hero */

.hero{
text-align:center;
padding:60px 20px 40px;
}

.hero img{
max-width:420px;
width:90%;
margin-bottom:20px;
}

.subtitle{
color:#bbb;
font-size:18px;
}

/* container */

.container{
max-width:900px;
margin:auto;
padding:30px 20px 60px;
}

/* song list */

.song-list{
background:#181820;
padding:25px;
border-radius:14px;
margin-bottom:50px;
}

.song-list h2{
margin-top:0;
}

.song-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:10px;
}

.song-grid a{
background:#22222c;
padding:10px;
border-radius:8px;
text-decoration:none;
color:#eee;
transition:.2s;
}

.song-grid a:hover{
background:#35354a;
transform:translateY(-2px);
}

/* cards */

.song-card{
background:#181820;
padding:25px;
border-radius:14px;
margin-bottom:40px;
opacity:0;
transform:translateY(20px);
animation:fadeUp .6s forwards;
}

.song-title{
font-size:20px;
font-weight:bold;
}

.comment{
background:#22222c;
padding:15px;
border-radius:8px;
margin-top:15px;
color:#ddd;
}

iframe{
width:100%;
height:315px;
margin-top:15px;
border:none;
}

.back{
text-align:right;
margin-top:10px;
}

.back a{
color:#aaa;
text-decoration:none;
font-size:14px;
}

@keyframes fadeUp{

to{
opacity:1;
transform:none;
}

}

</style>
</head>


<body id="top">

<div class="hero">

<img src="logo.png">

<div class="subtitle">
健啓Webオンリー<br>
イメージソング企画 発表
</div>

</div>


<div class="container">

<div class="song-list">

<h2>🎧 曲一覧</h2>

<div class="song-grid">

<a href="#s2">02 曲名</a>
<a href="#s3">03 曲名</a>
<a href="#s4">04 曲名</a>
<a href="#s5">05 曲名</a>
<a href="#s6">06 曲名</a>
<a href="#s7">07 曲名</a>
<a href="#s8">08 曲名</a>
<a href="#s9">09 曲名</a>
<a href="#s10">10 曲名</a>

</div>

</div>



<div class="song-card" id="s1">

<div class="song-title">01 曲名</div>

<iframe src="https://www.youtube.com/embed/動画ID"></iframe>

<div class="comment">

💬 コメント

</div>

<div class="back">
<a href="#top">↑一覧へ戻る</a>
</div>

</div>

</div>

</div>

</div>


</div>

</body>
</html>
